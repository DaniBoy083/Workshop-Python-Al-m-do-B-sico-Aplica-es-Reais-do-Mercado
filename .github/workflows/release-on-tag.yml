name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Build executable
        shell: pwsh
        run: ./scripts/build_windows_exe.ps1

      - name: Package artifact
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipPath = "dist/PokedexDataStudio-win64-$tag.zip"
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          Compress-Archive -Path dist/PokedexDataStudio/* -DestinationPath $zipPath -CompressionLevel Optimal
          "asset_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create or update release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "${{ steps.package.outputs.asset_path }}"
          $title = "Pokedex Data Studio $tag"

          gh release view $tag --repo ${{ github.repository }} *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --repo ${{ github.repository }} --clobber
          } else {
            gh release create $tag $asset --repo ${{ github.repository }} --title $title --generate-notes
          }
